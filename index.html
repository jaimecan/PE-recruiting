<script>
// GH SYNC
var _ghToken=null;
function pushToGitHub(){
  var btn=document.getElementById("github-sync-btn");
  if(!_ghToken){var t=prompt("GitHub PAT (memory only):"); if(!t)return; _ghToken=t.trim();}
  btn.textContent="Syncing..."; btn.disabled=true;
  fetch("https://api.github.com/repos/jaimecan/PE-recruiting/contents/index.html",
    {headers:{"Authorization":"token "+_ghToken,"Accept":"application/vnd.github.v3+json"}})
  .then(function(r){return r.json();})
  .then(function(meta){
    var sha=meta.sha;
    var c=decodeURIComponent(escape(atob(meta.content.replace(/\n/g,""))));
    var d=localStorage.getItem(STORAGE_KEY)||"[]";
    var i0=c.indexOf("var SEED_DATA=["); if(i0===-1)throw new Error("marker missing");
    var b0=c.indexOf("[",i0+14); var dp=0,b1=-1;
    for(var i=b0;i<c.length;i++){if(c[i]==="[")dp++;if(c[i]==="]"){dp--;if(dp===0){b1=i;break;}}}
    var u=c.slice(0,b0)+d+c.slice(b1+1);
    var enc=btoa(unescape(encodeURIComponent(u)));
    return fetch("https://api.github.com/repos/jaimecan/PE-recruiting/contents/index.html",
      {method:"PUT",headers:{"Authorization":"token "+_ghToken,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"},
       body:JSON.stringify({message:"Sync SEED_DATA "+(new Date().toISOString().slice(0,10)),content:enc,sha:sha})});
  })
  .then(function(r){return r.json();})
  .then(function(res){
    if(res.content){btn.textContent="✓ Synced!";btn.style.background="#2d6a4f";
      setTimeout(function(){btn.textContent="☁ Sync";btn.style.background="";btn.disabled=false;},3000);
    }else{throw new Error(res.message||"unknown error");}
  })
  .catch(function(e){_ghToken=null;btn.textContent="☁ Sync";btn.disabled=false;alert("Sync failed: "+e.message);});
}
</script>

label{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-dim);}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:7px 11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:var(--surface2);}
textarea{resize:vertical;min-height:65px;}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.btn-cancel{padding:7px 15px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
.btn-save{padding:7px 18px;background:var(--accent);border:none;border-radius:5px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.btn-delete{padding:7px 15px;background:transparent;border:1px solid var(--red);border-radius:5px;color:var(--red);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-right:auto;}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;line-height:1;}
.modal-close:hover{color:var(--text);}
.type-toggle{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden;}
.type-btn{flex:1;padding:8px;border:none;background:transparent;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;color:var(--text-muted);transition:all 0.15s;}
.type-btn.active-fund{background:rgba(154,111,46,0.1);color:var(--accent);font-weight:600;}
.type-btn.active-hh{background:rgba(74,127,165,0.1);color:var(--hh);font-weight:600;}
.pipeline{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;overflow-x:auto;}
.pipeline-col{min-width:175px;}
.pipeline-header{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);padding:8px 0 10px;border-bottom:2px solid var(--border);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.pipeline-count{background:var(--surface2);color:var(--text-muted);border-radius:10px;padding:1px 7px;font-size:10px;}
.pipeline-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 11px;margin-bottom:7px;cursor:pointer;transition:border-color 0.15s,transform 0.1s;}
.pipeline-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.pc-firm{font-weight:500;font-size:13px;margin-bottom:4px;}
.pc-geo{font-size:10px;margin-bottom:5px;}
.pc-action{font-size:11px;color:var(--text-muted);font-style:italic;}
.pc-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:4px;}
.calendar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.week-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px;}
.week-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.8px;color:var(--text-dim);text-transform:uppercase;margin-bottom:9px;}
.cal-item{display:flex;gap:9px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.cal-item:last-child{border-bottom:none;}
.cal-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.cal-dot.fund{background:var(--accent);}.cal-dot.hh{background:var(--hh);}
.cal-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);min-width:30px;margin-top:1px;}
.cal-firm{font-weight:500;color:var(--text);font-size:12px;}
.cal-firm.hh{color:var(--hh);}
.cal-text{font-size:11px;color:var(--text-muted);}
.empty{text-align:center;padding:28px 20px;color:var(--text-dim);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.5px;}
@media(max-width:900px){.stats-row{grid-template-columns:repeat(2,1fr);}.main{padding:16px;}.header{padding:14px 16px;}.tabs{padding:0 16px;}}
</style>

emailjs.init(EMAILJS_PUBLIC_KEY);

function fmtRow(f){
  var icon=f.type==='headhunter'?'🤝':'🏦';
  var contact=f.contact&&f.contact!=='—'&&f.contact!==''?'\n   👤 '+f.contact:'';
  return icon+' '+f.firm+' ('+f.geo+')\n   → '+f.action+contact;
}

function sendBriefing(){
  var btn=document.getElementById('briefing-btn');
  var today=new Date();today.setHours(0,0,0,0);
  var todayStr=today.toISOString().split('T')[0];
  var overdue=firms.filter(function(f){return f.nextDate&&new Date(f.nextDate+'T00:00:00')<today;});
  var dueToday=firms.filter(function(f){return f.nextDate===todayStr;});
  var upcoming=firms.filter(function(f){
    if(!f.nextDate)return false;
    var d=new Date(f.nextDate+'T00:00:00');
    var diff=(d-today)/86400000;
    return diff>0&&diff<=7;
  }).sort(function(a,b){return a.nextDate.localeCompare(b.nextDate);});
  if(!overdue.length&&!dueToday.length){alert('Nothing overdue or due today!');return;}
  var overdueSection=overdue.length?overdue.map(fmtRow).join('\n\n'):'Nothing overdue — great work!';
  var todaySection=dueToday.length?dueToday.map(fmtRow).join('\n\n'):'(none due today)';
  var upcomingSection=upcoming.length?upcoming.map(function(f){return '📆 '+fmtDate(f.nextDate)+'\n'+fmtRow(f);}).join('\n\n'):'(nothing in the next 7 days)';
  var dateLabel=today.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  btn.disabled=true;btn.textContent='⏳ Sending…';
  emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,{to_email:RECIPIENT_EMAIL,date:dateLabel,overdue_section:overdueSection,today_section:todaySection,upcoming_section:upcomingSection})
  .then(function(){btn.textContent='✓ Sent!';setTimeout(function(){btn.disabled=false;btn.textContent='📧 Today\'s Briefing';},3000);})
  .catch(function(err){btn.textContent='✗ Failed';alert('Send failed: '+JSON.stringify(err));setTimeout(function(){btn.disabled=false;btn.textContent='📧 Today\'s Briefing';},3000);});
}

function exportBackup(){
  var data=localStorage.getItem(STORAGE_KEY)||'[]';
  var blob=new Blob([data],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var today=new Date().toISOString().split('T')[0];
  a.href=url;a.download='pe-recruiting-backup-'+today+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function dateCls(d){
  if(!d)return'';
  var dt=new Date(d),now=new Date();
  now.setHours(0,0,0,0);dt.setHours(0,0,0,0);
  var diff=(dt-now)/86400000;
  if(diff<0)return'overdue';if(diff<=4)return'soon';return'';
}
function fmtDate(d){
  if(!d)return'—';
  return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}

function geoBadge(g){

}

function load(){
  try{
    var raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      firms=JSON.parse(raw);
      var storedIds=firms.map(function(f){return f.id;});
      SEED_DATA.forEach(function(s){
        if(storedIds.indexOf(s.id)<0){firms.push(s);}
      });
      save();
      return;
    }
    firms=SEED_DATA.slice();
    save();
  }catch(e){
    firms=SEED_DATA.slice();
    save();
  }
}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(firms));}

function mergeEntry(current,incoming){
  var merged=Object.assign({},current);
  Object.keys(incoming).forEach(function(k){
    var v=incoming[k];
    if(v!==undefined&&v!==null&&v!==''){
      merged[k]=v;
    }
  });
  if(!merged.updatedAt){
    merged.updatedAt=Date.now();
  }
  return merged;
}

function importBackup(event){
  var file=event.target.files&&event.target.files[0];
  if(!file)return;

  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var imported=JSON.parse(e.target.result);
      if(!Array.isArray(imported)) throw new Error('Backup must be a JSON array.');

      var byId={};
      firms.forEach(function(f){ byId[f.id]=f; });

      var added=0;
      var mergedCount=0;

      imported.forEach(function(item){
        if(!item||!item.id) return;

        if(!byId[item.id]){
          byId[item.id]=item;
          added++;
        }else{
          byId[item.id]=mergeEntry(byId[item.id],item);
          mergedCount++;
        }
      });

      firms=Object.keys(byId).map(function(id){ return byId[id]; });
      save();
      refresh();

      alert('Import complete: '+added+' new entries added, '+mergedCount+' existing entries merged.');
    }catch(err){
      alert('Import failed: '+err.message);
    }finally{
      event.target.value='';
    }
  };

  reader.readAsText(file);
}

function setTypeFilter(type,btn){
  activeTypeFilter=type;
  ['fb-all','fb-fund','fb-hh'].forEach(function(id){document.getElementById(id).className='filter-btn';});
  btn.classList.add(type==='headhunter'?'active-hh':'active');
  renderTracker();
}
function setStatusFilter(s,btn){
  if(s===activeStatusFilter){activeStatusFilter=null;btn.classList.remove('active');}
  else{
    activeStatusFilter=s;
    document.querySelectorAll('.filters .filter-btn').forEach(function(b){if(['Target','Outreach','Networking','In Process','Rejected'].indexOf(b.textContent.trim())>=0)b.classList.remove('active');});
    btn.classList.add('active');
  }
  renderTracker();
}
function setGeoFilter(g,btn){
  if(g===activeGeoFilter){activeGeoFilter=null;btn.classList.remove('active');}
  else{
    activeGeoFilter=g;
    document.querySelectorAll('.filters .filter-btn').forEach(function(b){if(['US','London','Abu Dhabi','Madrid'].indexOf(b.textContent.trim())>=0)b.classList.remove('active');});
    btn.classList.add('active');
  }
  renderTracker();
}
function getFiltered(){
  var q=(document.getElementById('search-input').value||'').toLowerCase();
  return firms.filter(function(f){
    return(activeTypeFilter==='all'||f.type===activeTypeFilter)&&
      (!activeStatusFilter||f.status===activeStatusFilter)&&
      (!activeGeoFilter||f.geo===activeGeoFilter)&&
      (!q||[f.firm,f.contact,f.notes,f.headhunter,f.action].join(' ').toLowerCase().indexOf(q)>=0);
  });
}

var GEO_ORDER=['US','London','Abu Dhabi','Madrid','Multi'];
var GEO_LABELS={US:'United States',London:'London & UK','Abu Dhabi':'Abu Dhabi / MENA',Madrid:'Madrid & Spain',Multi:'Multi-Geography'};

function renderTracker(){
  var data=getFiltered();
  var container=document.getElementById('tracker-body');
  if(!data.length){container.innerHTML='<div class="table-wrapper"><div class="empty">No entries match current filters.</div></div>';updateStats();return;}
  var byGeo={};
  GEO_ORDER.forEach(function(g){byGeo[g]={fund:[],headhunter:[]};});
  data.forEach(function(f){
    var g=f.geo||'Multi';
    if(!byGeo[g])byGeo[g]={fund:[],headhunter:[]};
    byGeo[g][f.type==='headhunter'?'headhunter':'fund'].push(f);
  });
  var html='';
  GEO_ORDER.forEach(function(geo){
    var funds=(byGeo[geo]?byGeo[geo].fund:[]).sort(function(a,b){return(parseInt(a.priority)||9)-(parseInt(b.priority)||9);});
    var hhs=(byGeo[geo]?byGeo[geo].headhunter:[]).sort(function(a,b){return(a.nextDate||'').localeCompare(b.nextDate||'');});
    if(!funds.length&&!hhs.length)return;
    html+='<div class="geo-section"><div class="geo-section-header"><div class="geo-section-title">'+(GEO_LABELS[geo]||geo)+'</div><div class="geo-section-meta">'+funds.length+' fund'+(funds.length!==1?'s':'')+' · '+hhs.length+' HH</div></div>';
    if(funds.length)html+='<div class="subsection-label">Funds &amp; Firms</div><div class="table-wrapper">'+buildFundTable(funds)+'</div>';
    if(hhs.length)html+='<div class="subsection-label hh">Headhunters</div><div class="table-wrapper">'+buildHHTable(hhs)+'</div>';
    html+='</div>';
  });
  container.innerHTML=html;
  updateStats();
}

function buildFundTable(data){
  var rows='';
  data.forEach(function(f){
    var dc=dateCls(f.nextDate),p=parseInt(f.priority)||2;
    rows+='<tr onclick="openModal(\''+f.id+'\')"><td><span class="priority p'+p+'">P'+p+'</span></td><td><div class="firm-name">'+f.firm+'</div>'+(f.aum?'<div class="firm-sub">'+f.aum+'</div>':'')+'</td><td style="font-size:12px;color:var(--text-muted)">'+(f.strategy||'—')+'</td><td>'+statusBadge(f.status)+'</td><td class="contact-cell">'+(f.contact?f.contact.split('—')[0].trim():'—')+'</td><td><div class="next-action '+dc+'">'+(f.action||'—')+'</div></td><td><span class="date-cell '+dc+'">'+fmtDate(f.nextDate)+'</span></td><td style="font-size:11px;color:var(--text-dim)">'+(f.headhunter||'—')+'</td><td><div class="notes-preview">'+(f.notes||'')+'</div></td><td class="actions-cell"><button class="icon-btn" onclick="event.stopPropagation();openModal(\''+f.id+'\')">✎</button></td></tr>';
  });
  return'<table><thead><tr><th>P</th><th>Firm</th><th>Strategy</th><th>Status</th><th>Contact</th><th>Next Action</th><th>Date</th><th>HH</th><th>Notes</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function buildHHTable(data){
  var rows='';
  data.forEach(function(f){
    var dc=dateCls(f.nextDate);
    rows+='<tr class="hh-row" onclick="openModal(\''+f.id+'\')"><td><div class="firm-name hh-name">'+f.firm+'</div></td><td>'+statusBadge(f.status)+'</td><td class="contact-cell">'+(f.contact||'—')+'</td><td><div class="next-action '+dc+'">'+(f.action||'—')+'</div></td><td><span class="date-cell '+dc+'">'+fmtDate(f.nextDate)+'</span></td><td><div class="notes-preview">'+(f.notes||'')+'</div></td><td class="actions-cell"><button class="icon-btn" onclick="event.stopPropagation();openModal(\''+f.id+'\')">✎</button></td></tr>';
  });
  return'<table><thead><tr><th>Headhunter</th><th>Status</th><th>Contact</th><th>Next Action</th><th>Date</th><th>Notes</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function updateStats(){
  var funds=firms.filter(function(f){return f.type!=='headhunter';});
  var hhs=firms.filter(function(f){return f.type==='headhunter';});
  document.getElementById('s-total').textContent=funds.length;
  document.getElementById('s-hh').textContent=hhs.length;
  document.getElementById('s-process').textContent=funds.filter(function(f){return f.status==='In Process';}).length;
  document.getElementById('s-network').textContent=funds.filter(function(f){return f.status==='Networking';}).length;
  document.getElementById('s-overdue').textContent=firms.filter(function(f){return f.nextDate&&dateCls(f.nextDate)==='overdue';}).length;
  var geos=['London','Abu Dhabi','Madrid','US'];
  document.getElementById('s-geo-breakdown').textContent=geos.map(function(g){return g+': '+funds.filter(function(f){return f.geo===g;}).length;}).join(' · ');
  document.getElementById('s-hh-sub').textContent=['US','London'].map(function(g){return g+': '+hhs.filter(function(h){return h.geo===g;}).length;}).join(' · ');
  document.getElementById('h-funds').textContent=funds.length;
  document.getElementById('h-hh').textContent=hhs.length;
  document.getElementById('h-active').textContent=firms.filter(function(f){return['Rejected','Offer'].indexOf(f.status)<0;}).length;
  var next=firms.filter(function(f){return f.nextDate&&dateCls(f.nextDate)!=='';}).sort(function(a,b){return a.nextDate.localeCompare(b.nextDate);})[0];
  document.getElementById('h-next').textContent=next?next.firm.split(' ')[0]+' '+fmtDate(next.nextDate):'—';
}

function renderPipeline(){
  var stages=['Target','Outreach Sent','Networking','In Process','Rejected','Offer'];
  var fundData=firms.filter(function(f){return f.type!=='headhunter';});
  document.getElementById('pipeline-board').innerHTML=stages.map(function(stage){
    var cards=fundData.filter(function(f){return f.status===stage;});
    return'<div class="pipeline-col"><div class="pipeline-header"><span>'+stage+'</span><span class="pipeline-count">'+cards.length+'</span></div>'+(cards.length?cards.map(function(f){return'<div class="pipeline-card" onclick="openModal(\''+f.id+'\')"><div class="pc-firm">'+f.firm+'</div><div class="pc-geo">'+geoBadge(f.geo)+'</div>'+(f.action?'<div class="pc-action">'+f.action+'</div>':'')+(f.nextDate?'<div class="pc-date">'+fmtDate(f.nextDate)+'</div>':'')+'</div>';}).join(''):'<div style="font-size:11px;color:var(--text-dim);font-family:\'DM Mono\',monospace;padding:8px 0">empty</div>')+'</div>';
  }).join('');
}

function renderCalendar(){
  var now=new Date();now.setHours(0,0,0,0);
  var weekMap={};
  firms.filter(function(f){return f.nextDate;}).sort(function(a,b){return a.nextDate.localeCompare(b.nextDate);}).forEach(function(f){
    var d=new Date(f.nextDate+'T00:00:00');
    var wk=Math.max(0,Math.floor((d-now)/(7*86400000)));
    if(wk<8){if(!weekMap[wk])weekMap[wk]=[];weekMap[wk].push(f);}
  });
  var html=[];
  for(var w=0;w<8;w++){
    var wStart=new Date(now);wStart.setDate(now.getDate()+w*7);
    var label='Week of '+wStart.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    var items=weekMap[w]||[];
    html.push('<div class="week-block"><div class="week-label">'+label+'</div>'+(items.length?items.map(function(f){return'<div class="cal-item" onclick="openModal(\''+f.id+'\')"><div class="cal-dot '+(f.type==='headhunter'?'hh':'fund')+'"></div><div class="cal-date">'+fmtDate(f.nextDate)+'</div><div><div class="cal-firm '+(f.type==='headhunter'?'hh':'')+'">'+f.firm+'</div><div class="cal-text">'+(f.action||'')+'</div></div></div>';}).join(''):'<div class="cal-item"><div class="cal-text" style="color:var(--text-dim)">No actions</div></div>')+'</div>');
  }
  document.getElementById('cal-grid').innerHTML=html.join('');
}

function setModalType(type){
  modalType=type;
  document.getElementById('tbtn-fund').className='type-btn'+(type==='fund'?' active-fund':'');
  document.getElementById('tbtn-hh').className='type-btn'+(type==='headhunter'?' active-hh':'');
  document.querySelectorAll('.fund-only').forEach(function(el){el.style.display=type==='fund'?'':'none';});
  var sel=document.getElementById('f-status'),cur=sel.value;
  var opts=type==='headhunter'?['Target','Outreach Sent','Networking','Registered','Rejected']:['Target','Outreach Sent','Networking','In Process','Rejected','Offer'];
  sel.innerHTML=opts.map(function(s){return'<option value="'+s+'"'+(s===cur?' selected':'')+'>'+s+'</option>';}).join('');
}

function openModal(id){
  editingId=id||null;
  var del=document.getElementById('btn-delete');
  if(id){
    var f=firms.filter(function(x){return x.id===id;})[0];if(!f)return;
    document.getElementById('modal-title').textContent='Edit Entry';del.style.display='block';
    setModalType(f.type||'fund');
    document.getElementById('f-firm').value=f.firm;
    document.getElementById('f-geo').value=f.geo;
    document.getElementById('f-status').value=f.status;
    document.getElementById('f-strategy').value=f.strategy||'';
    document.getElementById('f-aum').value=f.aum||'';
    document.getElementById('f-priority').value=f.priority||'2';
    document.getElementById('f-contact').value=f.contact||'';
    document.getElementById('f-action').value=f.action||'';
    document.getElementById('f-date').value=f.nextDate||'';
    document.getElementById('f-headhunter').value=f.headhunter||'';
    document.getElementById('f-notes').value=f.notes||'';
  }else{
    document.getElementById('modal-title').textContent='Add Entry';del.style.display='none';
    setModalType('fund');
    ['f-firm','f-aum','f-contact','f-action','f-date','f-headhunter','f-notes'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('f-geo').value='';
    document.getElementById('f-strategy').value='';
    document.getElementById('f-status').value='Target';
    document.getElementById('f-priority').value='1';
  }
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('f-firm').focus();},50);
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');editingId=null;}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function saveFirm(){
  var firm=document.getElementById('f-firm').value.trim();
  var geo=document.getElementById('f-geo').value;
  var status=document.getElementById('f-status').value;
  if(!firm||!geo||!status){alert('Name, geography and status are required.');return;}
  var data={type:modalType,firm:firm,geo:geo,status:status,
    strategy:modalType==='fund'?document.getElementById('f-strategy').value:'',
    aum:modalType==='fund'?document.getElementById('f-aum').value.trim():'',
    priority:modalType==='fund'?document.getElementById('f-priority').value:'2',
    headhunter:modalType==='fund'?document.getElementById('f-headhunter').value.trim():'',
    contact:document.getElementById('f-contact').value.trim(),
    action:document.getElementById('f-action').value.trim(),
    nextDate:document.getElementById('f-date').value,
    notes:document.getElementById('f-notes').value.trim(),
    updatedAt:Date.now()};
  if(editingId){
    var idx=-1;
    firms.forEach(function(f,i){if(f.id===editingId)idx=i;});
    if(idx>=0)firms[idx]=Object.assign({},firms[idx],data);
  }else{
    firms.push(Object.assign({id:uid(),created:Date.now(),updatedAt:Date.now()},data));
  }
  save();closeModal();refresh();
}

function deleteFirm(){
  if(!editingId||!confirm('Remove this entry?'))return;
  firms=firms.filter(function(f){return f.id!==editingId;});
  save();closeModal();refresh();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',['tracker','pipeline','calendar'][i]===tab);});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.getElementById('view-'+tab).classList.add('active');
  if(tab==='pipeline')renderPipeline();
  if(tab==='calendar')renderCalendar();
}
function refresh(){renderTracker();renderPipeline();renderCalendar();}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeModal();
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openModal();}
});

load();
renderTracker();
</script>
</body>
</html>
