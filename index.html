<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PE Recruiting — Jaime</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f7f4; --surface: #ffffff; --surface2: #f2f0ec; --border: #e2ddd8;
    --accent: #9a6f2e; --text: #1a1917; --text-muted: #6b6760; --text-dim: #a09d99;
    --green: #2d7a57; --yellow: #b8860b; --red: #b55a44; --blue: #3a8a78;
    --purple: #6b5fa0; --hh: #4a7fa5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }
  .header { border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 100; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent); letter-spacing: -0.3px; }
  .logo span { color: var(--text-muted); font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 400; }
  .header-stats { display: flex; gap: 20px; align-items: center; }
  .stat-pill { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; }
  .stat-pill strong { color: var(--text); font-size: 15px; font-weight: 500; margin-right: 4px; }
  .stat-pill.hh-pill strong { color: var(--hh); }
  .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 32px; background: var(--bg); }
  .tab { padding: 12px 20px; font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none; }
  .tab:hover { color: var(--text-muted); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .main { padding: 28px 32px; max-width: 1500px; margin: 0 auto; }
  .view { display: none; } .view.active { display: block; }
  .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 22px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
  .stat-value { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--text); line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .filters { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 5px 13px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
  .filter-btn.active-hh { background: var(--hh); border-color: var(--hh); color: #fff; font-weight: 500; }
  .filter-sep { width: 1px; height: 18px; background: var(--border); }
  .search-input { margin-left: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 5px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; width: 210px; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }
  .geo-section { margin-bottom: 28px; }
  .geo-section-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; padding-bottom: 7px; border-bottom: 2px solid var(--border); }
  .geo-section-title { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--text); }
  .geo-section-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; margin-left: auto; }
  .subsection-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); display: flex; align-items: center; gap: 8px; margin-bottom: 6px; margin-top: 10px; }
  .subsection-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .subsection-label.hh { color: var(--hh); }
  .table-wrapper { border: 1px solid var(--border); border-radius: 7px; overflow: hidden; margin-bottom: 4px; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface); }
  th { padding: 9px 12px; text-align: left; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); font-weight: 400; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: var(--text-muted); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface); }
  tbody tr.hh-row:hover { background: rgba(74,127,165,0.04); }
  td { padding: 10px 12px; font-size: 13px; vertical-align: middle; }
  .firm-name { font-weight: 500; color: var(--text); }
  .firm-name.hh-name { color: var(--hh); }
  .firm-sub { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-top: 1px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 500; letter-spacing: 0.3px; white-space: nowrap; }
  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .badge-target { background: rgba(154,142,196,0.12); color: var(--purple); } .badge-target::before { background: var(--purple); }
  .badge-outreach { background: rgba(200,169,110,0.12); color: var(--yellow); } .badge-outreach::before { background: var(--yellow); }
  .badge-networking { background: rgba(126,184,164,0.12); color: var(--blue); } .badge-networking::before { background: var(--blue); }
  .badge-process { background: rgba(90,158,124,0.12); color: var(--green); } .badge-process::before { background: var(--green); }
  .badge-rejected { background: rgba(196,126,107,0.12); color: var(--red); } .badge-rejected::before { background: var(--red); }
  .badge-offer { background: rgba(90,158,124,0.2); color: #1a7a47; } .badge-offer::before { background: #2d7a57; }
  .badge-registered { background: rgba(74,127,165,0.12); color: var(--hh); } .badge-registered::before { background: var(--hh); }
  .geo-tag { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-family: 'DM Mono', monospace; background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .geo-london { border-color: #7eb8a466; color: var(--blue); background: rgba(126,184,164,0.06); }
  .geo-abudhabi { border-color: #c8a96e66; color: var(--yellow); background: rgba(200,169,110,0.06); }
  .geo-madrid { border-color: #c47e6b66; color: var(--red); background: rgba(196,126,107,0.06); }
  .geo-us { border-color: #9b8ec466; color: var(--purple); background: rgba(154,142,196,0.06); }
  .priority { font-family: 'DM Mono', monospace; font-size: 12px; }
  .p1 { color: #e8856a; } .p2 { color: var(--yellow); } .p3 { color: var(--text-muted); }
  .next-action { font-size: 12px; color: var(--text-muted); max-width: 240px; }
  .next-action.overdue { color: var(--red); } .next-action.soon { color: var(--yellow); }
  .date-cell { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .date-cell.overdue { color: var(--red); } .date-cell.soon { color: var(--yellow); }
  .contact-cell { font-size: 12px; color: var(--text-muted); }
  .notes-preview { font-size: 11px; color: var(--text-dim); font-style: italic; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .actions-cell { white-space: nowrap; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--text-dim); font-size: 14px; padding: 3px 5px; border-radius: 3px; transition: color 0.1s, background 0.1s; }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }
  .btn-add { display: flex; align-items: center; gap: 7px; padding: 7px 15px; background: var(--accent); color: #fff; border: none; border-radius: 5px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-add:hover { opacity: 0.88; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 26px; width: 620px; max-height: 90vh; overflow-y: auto; position: relative; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent); margin-bottom: 18px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-dim); }
  input, select, textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 7px 11px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 65px; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .btn-cancel { padding: 7px 15px; background: transparent; border: 1px solid var(--border); border-radius: 5px; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
  .btn-save { padding: 7px 18px; background: var(--accent); border: none; border-radius: 5px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-delete { padding: 7px 15px; background: transparent; border: 1px solid var(--red); border-radius: 5px; color: var(--red); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; margin-right: auto; }
  .modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .type-toggle { display: flex; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
  .type-btn { flex: 1; padding: 8px; border: none; background: transparent; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
  .type-btn.active-fund { background: rgba(154,111,46,0.1); color: var(--accent); font-weight: 600; }
  .type-btn.active-hh { background: rgba(74,127,165,0.1); color: var(--hh); font-weight: 600; }
  .pipeline { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; overflow-x: auto; }
  .pipeline-col { min-width: 175px; }
  .pipeline-header { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); padding: 8px 0 10px; border-bottom: 2px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .pipeline-count { background: var(--surface2); color: var(--text-muted); border-radius: 10px; padding: 1px 7px; font-size: 10px; }
  .pipeline-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 11px; margin-bottom: 7px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
  .pipeline-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .pc-firm { font-weight: 500; font-size: 13px; margin-bottom: 4px; }
  .pc-geo { font-size: 10px; margin-bottom: 5px; }
  .pc-action { font-size: 11px; color: var(--text-muted); font-style: italic; }
  .pc-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 4px; }
  .calendar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .week-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 13px; }
  .week-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.8px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 9px; }
  .cal-item { display: flex; gap: 9px; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .cal-item:last-child { border-bottom: none; }
  .cal-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .cal-dot.fund { background: var(--accent); } .cal-dot.hh { background: var(--hh); }
  .cal-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); min-width: 30px; margin-top: 1px; }
  .cal-firm { font-weight: 500; color: var(--text); font-size: 12px; }
  .cal-firm.hh { color: var(--hh); }
  .cal-text { font-size: 11px; color: var(--text-muted); }
  .empty { text-align: center; padding: 28px 20px; color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.5px; }
  @media (max-width: 900px) { .stats-row { grid-template-columns: repeat(2, 1fr); } .main { padding: 16px; } .header { padding: 14px 16px; } .tabs { padding: 0 16px; } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">PE Recruiting <span>// Wharton MBA 2027</span></div>
  <div class="header-stats">
    <div class="stat-pill"><strong id="h-funds">0</strong>funds</div>
    <div class="stat-pill hh-pill"><strong id="h-hh">0</strong>headhunters</div>
    <div class="stat-pill"><strong id="h-active">0</strong>active</div>
    <div class="stat-pill"><strong id="h-next">—</strong>next action</div>
    <button class="btn-add" onclick="openModal()">+ Add Entry</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('tracker')">Tracker</div>
  <div class="tab" onclick="switchTab('pipeline')">Pipeline</div>
  <div class="tab" onclick="switchTab('calendar')">Calendar</div>
</div>

<div class="main">
  <div class="view active" id="view-tracker">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Funds Tracked</div><div class="stat-value" id="s-total">0</div><div class="stat-sub" id="s-geo-breakdown">—</div></div>
      <div class="stat-card"><div class="stat-label">Headhunters</div><div class="stat-value" id="s-hh" style="color:var(--hh)">0</div><div class="stat-sub" id="s-hh-sub">—</div></div>
      <div class="stat-card"><div class="stat-label">In Process</div><div class="stat-value" id="s-process" style="color:var(--green)">0</div><div class="stat-sub">interviews / final rounds</div></div>
      <div class="stat-card"><div class="stat-label">Networking</div><div class="stat-value" id="s-network" style="color:var(--blue)">0</div><div class="stat-sub">active conversations</div></div>
      <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-value" id="s-overdue" style="color:var(--red)">0</div><div class="stat-sub">need follow-up</div></div>
    </div>
    <div class="filters">
      <button class="filter-btn active" id="fb-all" onclick="setTypeFilter('all',this)">All</button>
      <button class="filter-btn" id="fb-fund" onclick="setTypeFilter('fund',this)">Funds Only</button>
      <button class="filter-btn" id="fb-hh" onclick="setTypeFilter('headhunter',this)">HH Only</button>
      <div class="filter-sep"></div>
      <button class="filter-btn" onclick="setStatusFilter('Target',this)">Target</button>
      <button class="filter-btn" onclick="setStatusFilter('Outreach Sent',this)">Outreach</button>
      <button class="filter-btn" onclick="setStatusFilter('Networking',this)">Networking</button>
      <button class="filter-btn" onclick="setStatusFilter('In Process',this)">In Process</button>

      <div class="filter-sep"></div>

      <button class="filter-btn" onclick="setGeoFilter('London',this)">London</button>
      <button class="filter-btn" onclick="setGeoFilter('Abu Dhabi',this)">Abu Dhabi</button>
      <button class="filter-btn" onclick="setGeoFilter('Madrid',this)">Madrid</button>

    </div>
    <div id="tracker-body"></div>
  </div>
  <div class="view" id="view-pipeline"><div class="pipeline" id="pipeline-board"></div></div>
  <div class="view" id="view-calendar">
    <div style="margin-bottom:14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:0.5px;">UPCOMING ACTIONS — next 8 weeks</div>
    <div class="calendar-grid" id="cal-grid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title" id="modal-title">Add Entry</div>

      <div class="form-group full"><label>Type</label>
        <div class="type-toggle">
          <button class="type-btn active-fund" id="tbtn-fund" onclick="setModalType('fund')">Fund / Firm</button>

        <select id="f-geo"><option value="">Select…</option><option value="US">US</option><option value="London">London</option><option value="Abu Dhabi">Abu Dhabi</option><option value="Madrid">Madrid</option><option value="Multi">Multi-geo</option></select>
      </div>

      </div>

    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'pe_recruiting_v3';
let firms = [];
let editingId = null;
let activeTypeFilter = 'all';
let activeStatusFilter = null;
let activeGeoFilter = null;
let modalType = 'fund';

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function dateCls(d) {
  if (!d) return '';
  const dt = new Date(d), now = new Date();
  now.setHours(0,0,0,0); dt.setHours(0,0,0,0);
  const diff = (dt - now) / 86400000;
  if (diff < 0) return 'overdue';
  if (diff <= 4) return 'soon';
  return '';
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
}
function statusBadge(s) {
  const map = { 'Target':'target','Outreach Sent':'outreach','Networking':'networking','In Process':'process','Rejected':'rejected','Offer':'offer','Registered':'registered' };
  return `<span class="badge badge-${map[s]||'target'}">${s}</span>`;
}
function geoBadge(g) {
  const cls = { London:'geo-london','Abu Dhabi':'geo-abudhabi',Madrid:'geo-madrid',US:'geo-us' };
  return `<span class="geo-tag ${cls[g]||''}">${g}</span>`;
}
function hhDate(i) {
  const d = new Date('2026-04-08');
  d.setDate(d.getDate() + Math.floor(i / 3));
  return d.toISOString().split('T')[0];
}

// ── SEED DATA: all 36 funds from your live dashboard ─────────────────────────

const UK_HH = ['Blackwood Group','Carpenter Farraday','KEA Consultants','Walker Hamill','Cornell Partnership','Stevenson James','Greenwich Partners','One Search','Selby Jennings','Morgan McKinley','Circle Square'];

function buildSeedHH() {
  let i = 0;
  return [
    ...US_HH.map(name => ({id:uid(),type:'headhunter',firm:name,geo:'US',strategy:'',aum:'',status:'Target',priority:'2',contact:'',action:'Reach out — intro email',nextDate:hhDate(i++),headhunter:'',notes:'',created:Date.now()})),
    ...UK_HH.map(name => ({id:uid(),type:'headhunter',firm:name,geo:'London',strategy:'',aum:'',status:'Target',priority:'2',contact:'',action:'Reach out — intro email',nextDate:hhDate(i++),headhunter:'',notes:'',created:Date.now()})),
  ];
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Guard: if stored data has fewer funds than seed, it's stale — reset
      const storedFunds = parsed.filter(f => f.type !== 'headhunter').length;
      if (storedFunds >= SEED_FUNDS.length) { firms = parsed; return; }
    }
    // First load or stale data: use hardcoded seed
    firms = [...SEED_FUNDS, ...buildSeedHH()];
    save();
  } catch(e) {
    firms = [...SEED_FUNDS, ...buildSeedHH()];
  }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(firms)); }

// ── FILTERS ──────────────────────────────────────────────────────────────────
function setTypeFilter(type, btn) {
  activeTypeFilter = type;
  ['fb-all','fb-fund','fb-hh'].forEach(id => { document.getElementById(id).className = 'filter-btn'; });
  btn.classList.add(type === 'headhunter' ? 'active-hh' : 'active');
  renderTracker();
}
function setStatusFilter(s, btn) {
  if (s === activeStatusFilter) { activeStatusFilter = null; btn.classList.remove('active'); }
  else {
    activeStatusFilter = s;
    document.querySelectorAll('.filters .filter-btn').forEach(b => {
      if (['Target','Outreach','Networking','In Process','Rejected'].includes(b.textContent.trim())) b.classList.remove('active');
    });
    btn.classList.add('active');
  }
  renderTracker();
}
function setGeoFilter(g, btn) {
  if (g === activeGeoFilter) { activeGeoFilter = null; btn.classList.remove('active'); }
  else {
    activeGeoFilter = g;
    document.querySelectorAll('.filters .filter-btn').forEach(b => {
      if (['US','London','Abu Dhabi','Madrid'].includes(b.textContent.trim())) b.classList.remove('active');
    });
    btn.classList.add('active');
  }
  renderTracker();
}
function getFiltered() {
  const q = (document.getElementById('search-input')?.value||'').toLowerCase();
  return firms.filter(f => {
    const typeOk = activeTypeFilter==='all' || f.type===activeTypeFilter;
    const statusOk = !activeStatusFilter || f.status===activeStatusFilter;
    const geoOk = !activeGeoFilter || f.geo===activeGeoFilter;
    const searchOk = !q || [f.firm,f.contact,f.notes,f.headhunter,f.action].join(' ').toLowerCase().includes(q);
    return typeOk && statusOk && geoOk && searchOk;
  });
}

// ── RENDER ───────────────────────────────────────────────────────────────────
const GEO_ORDER = ['US','London','Abu Dhabi','Madrid','Multi'];
const GEO_LABELS = {US:'United States',London:'London & UK','Abu Dhabi':'Abu Dhabi / MENA',Madrid:'Madrid & Spain',Multi:'Multi-Geography'};

function renderTracker() {
  const data = getFiltered();
  const container = document.getElementById('tracker-body');
  if (!data.length) { container.innerHTML=`<div class="table-wrapper"><div class="empty">No entries match current filters.</div></div>`; updateStats(); return; }

  const byGeo = {};
  GEO_ORDER.forEach(g => byGeo[g] = {fund:[],headhunter:[]});
  data.forEach(f => {
    const g = f.geo||'Multi';
    if (!byGeo[g]) byGeo[g]={fund:[],headhunter:[]};
    byGeo[g][f.type==='headhunter'?'headhunter':'fund'].push(f);
  });

  let html = '';
  GEO_ORDER.forEach(geo => {
    const funds = (byGeo[geo]?.fund||[]).sort((a,b)=>(parseInt(a.priority)||9)-(parseInt(b.priority)||9));
    const hhs = (byGeo[geo]?.headhunter||[]).sort((a,b)=>(a.nextDate||'').localeCompare(b.nextDate||''));
    if (!funds.length && !hhs.length) return;
    html += `<div class="geo-section">
      <div class="geo-section-header">
        <div class="geo-section-title">${GEO_LABELS[geo]||geo}</div>
        <div class="geo-section-meta">${funds.length} fund${funds.length!==1?'s':''} · ${hhs.length} HH</div>
      </div>`;
    if (funds.length) html += `<div class="subsection-label">Funds &amp; Firms</div><div class="table-wrapper">${buildFundTable(funds)}</div>`;
    if (hhs.length) html += `<div class="subsection-label hh">Headhunters</div><div class="table-wrapper">${buildHHTable(hhs)}</div>`;
    html += `</div>`;
  });
  container.innerHTML = html;
  updateStats();
}

function buildFundTable(data) {
  return `<table><thead><tr><th>P</th><th>Firm</th><th>Strategy</th><th>Status</th><th>Contact</th><th>Next Action</th><th>Date</th><th>HH</th><th>Notes</th><th></th></tr></thead><tbody>
  ${data.map(f => {
    const dc=dateCls(f.nextDate), p=parseInt(f.priority)||2;
    return `<tr onclick="openModal('${f.id}')">
      <td><span class="priority p${p}">P${p}</span></td>
      <td><div class="firm-name">${f.firm}</div>${f.aum?`<div class="firm-sub">${f.aum}</div>`:''}</td>
      <td style="font-size:12px;color:var(--text-muted)">${f.strategy||'—'}</td>
      <td>${statusBadge(f.status)}</td>
      <td class="contact-cell">${f.contact?f.contact.split('—')[0].trim():'—'}</td>
      <td><div class="next-action ${dc}">${f.action||'—'}</div></td>
      <td><span class="date-cell ${dc}">${fmtDate(f.nextDate)}</span></td>
      <td style="font-size:11px;color:var(--text-dim)">${f.headhunter||'—'}</td>
      <td><div class="notes-preview">${f.notes||''}</div></td>
      <td class="actions-cell"><button class="icon-btn" onclick="event.stopPropagation();openModal('${f.id}')">✎</button></td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function buildHHTable(data) {
  return `<table><thead><tr><th>Headhunter</th><th>Status</th><th>Contact</th><th>Next Action</th><th>Date</th><th>Notes</th><th></th></tr></thead><tbody>
  ${data.map(f => {
    const dc=dateCls(f.nextDate);
    return `<tr class="hh-row" onclick="openModal('${f.id}')">
      <td><div class="firm-name hh-name">${f.firm}</div></td>
      <td>${statusBadge(f.status)}</td>
      <td class="contact-cell">${f.contact||'—'}</td>
      <td><div class="next-action ${dc}">${f.action||'—'}</div></td>
      <td><span class="date-cell ${dc}">${fmtDate(f.nextDate)}</span></td>
      <td><div class="notes-preview">${f.notes||''}</div></td>
      <td class="actions-cell"><button class="icon-btn" onclick="event.stopPropagation();openModal('${f.id}')">✎</button></td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function updateStats() {
  const funds = firms.filter(f=>f.type!=='headhunter');
  const hhs = firms.filter(f=>f.type==='headhunter');
  document.getElementById('s-total').textContent = funds.length;
  document.getElementById('s-hh').textContent = hhs.length;
  document.getElementById('s-process').textContent = funds.filter(f=>f.status==='In Process').length;
  document.getElementById('s-network').textContent = funds.filter(f=>f.status==='Networking').length;
  document.getElementById('s-overdue').textContent = firms.filter(f=>f.nextDate&&dateCls(f.nextDate)==='overdue').length;
  const geos=['London','Abu Dhabi','Madrid','US'];
  document.getElementById('s-geo-breakdown').textContent = geos.map(g=>`${g}: ${funds.filter(f=>f.geo===g).length}`).join(' · ');
  document.getElementById('s-hh-sub').textContent = ['US','London'].map(g=>`${g}: ${hhs.filter(h=>h.geo===g).length}`).join(' · ');
  document.getElementById('h-funds').textContent = funds.length;
  document.getElementById('h-hh').textContent = hhs.length;
  document.getElementById('h-active').textContent = firms.filter(f=>!['Rejected','Offer'].includes(f.status)).length;
  const next = firms.filter(f=>f.nextDate&&dateCls(f.nextDate)!=='').sort((a,b)=>a.nextDate.localeCompare(b.nextDate))[0];
  document.getElementById('h-next').textContent = next ? `${next.firm.split(' ')[0]} ${fmtDate(next.nextDate)}` : '—';
}

function renderPipeline() {
  const stages=['Target','Outreach Sent','Networking','In Process','Rejected','Offer'];
  const fundData=firms.filter(f=>f.type!=='headhunter');
  document.getElementById('pipeline-board').innerHTML = stages.map(stage => {
    const cards=fundData.filter(f=>f.status===stage);
    return `<div class="pipeline-col">
      <div class="pipeline-header"><span>${stage}</span><span class="pipeline-count">${cards.length}</span></div>
      ${cards.length?cards.map(f=>`<div class="pipeline-card" onclick="openModal('${f.id}')">
        <div class="pc-firm">${f.firm}</div><div class="pc-geo">${geoBadge(f.geo)}</div>
        ${f.action?`<div class="pc-action">${f.action}</div>`:''}
        ${f.nextDate?`<div class="pc-date">${fmtDate(f.nextDate)}</div>`:''}
      </div>`).join(''):`<div style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;padding:8px 0">empty</div>`}
    </div>`;
  }).join('');
}

function renderCalendar() {
  const now=new Date(); now.setHours(0,0,0,0);
  const weekMap={};
  firms.filter(f=>f.nextDate).sort((a,b)=>a.nextDate.localeCompare(b.nextDate)).forEach(f=>{
    const d=new Date(f.nextDate+'T00:00:00');
    const wk=Math.max(0,Math.floor((d-now)/(7*86400000)));
    if(wk<8){if(!weekMap[wk])weekMap[wk]=[];weekMap[wk].push(f);}
  });
  const html=[];
  for(let w=0;w<8;w++){
    const wStart=new Date(now); wStart.setDate(now.getDate()+w*7);
    const label=`Week of ${wStart.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}`;
    const items=weekMap[w]||[];
    html.push(`<div class="week-block"><div class="week-label">${label}</div>
      ${items.length?items.map(f=>`<div class="cal-item" onclick="openModal('${f.id}')">
        <div class="cal-dot ${f.type==='headhunter'?'hh':'fund'}"></div>
        <div class="cal-date">${fmtDate(f.nextDate)}</div>
        <div><div class="cal-firm ${f.type==='headhunter'?'hh':''}">${f.firm}</div><div class="cal-text">${f.action||''}</div></div>
      </div>`).join(''):`<div class="cal-item"><div class="cal-text" style="color:var(--text-dim)">No actions</div></div>`}
    </div>`);
  }
  document.getElementById('cal-grid').innerHTML=html.join('');
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function setModalType(type) {
  modalType=type;
  document.getElementById('tbtn-fund').className='type-btn'+(type==='fund'?' active-fund':'');
  document.getElementById('tbtn-hh').className='type-btn'+(type==='headhunter'?' active-hh':'');
  document.querySelectorAll('.fund-only').forEach(el=>el.style.display=type==='fund'?'':'none');
  const sel=document.getElementById('f-status'), cur=sel.value;
  const opts=type==='headhunter'?['Target','Outreach Sent','Networking','Registered','Rejected']:['Target','Outreach Sent','Networking','In Process','Rejected','Offer'];
  sel.innerHTML=opts.map(s=>`<option value="${s}"${s===cur?' selected':''}>${s}</option>`).join('');
}

function openModal(id) {
  editingId=id||null;
  const del=document.getElementById('btn-delete');
  if(id){
    const f=firms.find(x=>x.id===id); if(!f)return;
    document.getElementById('modal-title').textContent='Edit Entry';
    del.style.display='block';
    setModalType(f.type||'fund');
    document.getElementById('f-firm').value=f.firm;
    document.getElementById('f-geo').value=f.geo;
    document.getElementById('f-status').value=f.status;
    document.getElementById('f-strategy').value=f.strategy||'';
    document.getElementById('f-aum').value=f.aum||'';
    document.getElementById('f-priority').value=f.priority||'2';
    document.getElementById('f-contact').value=f.contact||'';
    document.getElementById('f-action').value=f.action||'';
    document.getElementById('f-date').value=f.nextDate||'';
    document.getElementById('f-headhunter').value=f.headhunter||'';
    document.getElementById('f-notes').value=f.notes||'';
  } else {
    document.getElementById('modal-title').textContent='Add Entry';
    del.style.display='none';
    setModalType('fund');
    ['f-firm','f-aum','f-contact','f-action','f-date','f-headhunter','f-notes'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-geo').value='';
    document.getElementById('f-strategy').value='';
    document.getElementById('f-status').value='Target';
    document.getElementById('f-priority').value='1';
  }
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-firm').focus(),50);
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');editingId=null;}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function saveFirm(){
  const firm=document.getElementById('f-firm').value.trim();
  const geo=document.getElementById('f-geo').value;
  const status=document.getElementById('f-status').value;
  if(!firm||!geo||!status){alert('Name, geography and status are required.');return;}
  const data={
    type:modalType,firm,geo,status,
    strategy:modalType==='fund'?document.getElementById('f-strategy').value:'',
    aum:modalType==='fund'?document.getElementById('f-aum').value.trim():'',
    priority:modalType==='fund'?document.getElementById('f-priority').value:'2',
    headhunter:modalType==='fund'?document.getElementById('f-headhunter').value.trim():'',
    contact:document.getElementById('f-contact').value.trim(),
    action:document.getElementById('f-action').value.trim(),
    nextDate:document.getElementById('f-date').value,
    notes:document.getElementById('f-notes').value.trim(),
  };
  if(editingId){const idx=firms.findIndex(f=>f.id===editingId);if(idx>=0)firms[idx]={...firms[idx],...data};}
  else firms.push({id:uid(),created:Date.now(),...data});
  save();closeModal();refresh();
}

function deleteFirm(){
  if(!editingId||!confirm('Remove this entry?'))return;
  firms=firms.filter(f=>f.id!==editingId);
  save();closeModal();refresh();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['tracker','pipeline','calendar'][i]===tab));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(`view-${tab}`).classList.add('active');
  if(tab==='pipeline')renderPipeline();
  if(tab==='calendar')renderCalendar();
}
function refresh(){renderTracker();renderPipeline();renderCalendar();}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openModal();}
});

load();
renderTracker();
</script>
</body>
</html>
